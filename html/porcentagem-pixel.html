<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>porcentagem e pixel</title>

    <style>

        /*
          pixel - unidade de medida absoluta
          porcentagem - unidade de medida relativa
        */
        
        .pixel {
            background: red;
            border: 1px solid black;
            padding: 8px;
            width: 200px;
        }

        .porcentagem {
            border: 1px solid black;
            background: red;
            padding: 8px;
            width: 50%;
        }

        #area {
            border: 3px solid black;
            width: 500px;
        }

    </style>
</head>
<body>

    <div class="pixel">Pixel é a menor parte de uma i</div>
    <div class="porcentagem">Porcentagem (50% de body)</div>

    <hr>

    <div id="area">
        <div class="pixel">Pixel é a menor parte de uma i</div>
        <div class="porcentagem">Porcentagem (50% da div area)</div>
    </div>
    
    
</body>
</html>
