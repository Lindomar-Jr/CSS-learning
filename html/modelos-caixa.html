<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelos de caixa</title>

    <style>

    /* 
    Box Model (Modelo de Caixa)

    Padding -> espaço interno entre o conteúdo e a borda.
    Border  -> contorno que envolve o padding e o conteúdo.
     Margin  -> espaço externo que separa a caixa de outros elementos.
    */

        h1 {
            background-color: orange;
            border: 5px solid darkorange;
            color: white;
            padding: 20px;
            margin: 20px;
        }

        p {
           background-color: lightgray;
           border: 3px solid gray;
           padding: 10px;
           margin: 20px;
           color: purple;
        }

    </style>

</head>
<body>

    <h1>Modelo de caixa Lorem</h1>

    <p>
        Lorem, ipsum dolor sit amet consectetur adipisicing elit.
        Fugit expedita quod, voluptate sapiente fugiat,
        modi iure recusandae aperiam amet accusamus, 
        ea libero odit perspiciatis aspernatur distinctio eaque.
        Quae, modi eum!
    </p>
    
</body>
</html>
