<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vw-vh</title>

    <style>

        /*
            vw e vh são unidades de medida relativas ao tamanho da janela do navegador (viewport).

            vw (Viewport Width) → largura da janela.
            vh (Viewport Height) → altura da janela.
        */
        
        .vw {
            border: 1px solid black;
            background: red;
            padding: 8px;
            width: 50vw;
        }


        .vh {
            border: 1px solid black;
            background: red;
            padding: 8px;
            width: 20vh;
        }


        #area {
            border: 3px solid black;
            width: 600px;
        }

    </style>
</head>
<body>

    <div id="area">
        <div class="vw">Porcentagem (50vw da tela)</div>
        <div class="vh">
            Lorem ipsum dolor sit amet consectetur adipisicing elit.
            Reiciendis non perspiciatis qui praesentium magnam natus,
            commodi cumque, est esse corrupti corporis velit sint
            suscipit obcaecati optio temporibus molestiae nulla. Aliquam!
            Porcentagem (50vh da tela)
        </div>

    </div>
    
    
</body>
</html>
