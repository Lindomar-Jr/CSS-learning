<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio-Pseudo-Classes</title>

    <style>
        .botao {
            padding: 0.5em 1em;
            text-decoration: none;
            color: rgba(115, 12, 194, 0.83);
        }

       .botao:hover {
            background-color: rgba(115, 12, 194, 0.83);
            color: white;
       } 

       .botao:active {
            color: lightblue;
       }

    </style>

</head>
<body>

    <a href="" class="botao">Home</a> |
    <a href="" class="botao">Sobre</a> |
    <a href="" class="botao">Empresa</a> |
    <a href="" class="botao">Produtos</a> |
    <a href="" class="botao">Contato</a> |

</body>
</html>
